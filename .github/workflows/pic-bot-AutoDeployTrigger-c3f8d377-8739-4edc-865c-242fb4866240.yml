name: Trigger auto deployment for pic-bot

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pic-bot-AutoDeployTrigger-c3f8d377-8739-4edc-865c-242fb4866240.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PICBOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PICBOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PICBOT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: picbotregistry.azurecr.io
          registryUsername: ${{ secrets.PICBOT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PICBOT_REGISTRY_PASSWORD }}
          containerAppName: pic-bot
          resourceGroup: pic-bot-rg
          imageToBuild: picbotregistry.azurecr.io/pic-bot:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


